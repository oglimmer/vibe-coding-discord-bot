name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: oglimmer/review-action@v1.0.3
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
