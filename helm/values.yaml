replicaCount: 1

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

image:
  repository: ghcr.io/oglimmer/vibe-coding-discord-bot
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: oglimmerregistrykey

resources:
  requests:
    memory: "400Mi"
    cpu: "25m"
  limits:
    memory: "768Mi"
    cpu: "100m"

livenessProbe:
  exec:
    command:
      - sh
      - -c
      - |
        # 1) Fail if the bot process died
        if ! pgrep -f 'python.*main.py'; then
          echo "process missing" >&2
          echo "process missing" >/var/log/app.log
          exit 1
        fi

        # 2) Scan the last 100 lines for critical errors
        if tail -n100 /var/log/app.log | grep -qE 'Loop thread traceback|WARNING - Shard ID|database - ERROR - Error'; then
          echo "detected error pattern" >&2
          echo "detected error pattern" >/var/log/app.log
          exit 1
        fi

        exit 0
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  exec:
    command:
    - /bin/sh
    - -c
    - "test -f /tmp/bot_ready"
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

env:
  TZ: "Europe/Berlin"
  DB_HOST: "mariadb"
  DB_NAME: "vibe-bot"
  DB_USER: "vibe-bot"
  GAME_START_TIME: "13:37:00.000"
  SERGEANT_ROLE_ID: "1381201522238423122"
  COMMANDER_ROLE_ID: "1381201615155101857"
  GENERAL_ROLE_ID: "1381201618414080060"
  ANNOUNCEMENT_CHANNEL_ID: "1372659708045033616"
  KLUGSCHEISSER_ENABLED: "true"
  KLUGSCHEISSER_PROBABILITY: "10"
  KLUGSCHEISSER_MIN_LENGTH: "100"
  KLUGSCHEISSER_MAX_TOKENS: "200"
  KLUGSCHEISSER_MODEL: "gpt-4o-mini"
  KLUGSCHEISSER_COOLDOWN_SECONDS: "60"
  KLUGSCHEISSER_REQUIRE_OPTIN: "true"

  # Reaction-based Fact Checking
  FACTCHECK_REACTION_EMOJI: "🔍"
  FACTCHECK_DAILY_LIMIT_PER_USER: "5"

  # Vibecode (self-extending bot) - secrets and the enabled flag are
  # injected separately, gated on .Values.vibecode.enabled
  VIBECODE_REPO: "oglimmer/vibe-coding-discord-bot"
  VIBECODE_WORKER_IMAGE: "ghcr.io/oglimmer/vibe-coding-discord-bot-worker:latest"
  # Claude Code model id (bare, not aider's provider/model form): deepseek-*
  # routes to DeepSeek's Anthropic-compatible endpoint.
  VIBECODE_MODEL: "deepseek-v4-pro"
  VIBECODE_IMAGE_PULL_SECRET: "oglimmerregistrykey"
  # The worker implements, self-reviews, verifies, opens a PR and then works
  # through the AI reviewer's findings, so it needs a wide budget (2h).
  VIBECODE_JOB_TIMEOUT_SECONDS: "7200"
  VIBECODE_COOLDOWN_SECONDS: "900"
  VIBECODE_MAX_CONCURRENT_JOBS: "1"

  # Postillon RSS feed
  POSTILLON_ENABLED: "true"
  POSTILLON_CHANNEL_ID: "1487349441773174976"
  POSTILLON_FEED_URL: "https://www.der-postillon.com/feeds/posts/default?alt=rss&max-results=50&start-index=1"
  POSTILLON_POLL_INTERVAL_MINUTES: "15"
  POSTILLON_TIMEZONE: "Europe/Berlin"
  POSTILLON_ANNOUNCE_FIRST_SYNC: "false"
  POSTILLON_REQUEST_TIMEOUT_SECONDS: "20"
  POSTILLON_DELIVERY_DELAY_SECONDS: "1"
  POSTILLON_LEASE_SECONDS: "1800"

  # TL;DR Message Summarization (/tldr) - uses DeepSeek. The TLDR_ENABLED flag
  # and the shared DEEPSEEK_API_KEY secret are injected separately, gated on
  # .Values.tldr.enabled (see the tldr block below).
  TLDR_MODEL: "deepseek-chat"
  DEEPSEEK_BASE_URL: "https://api.deepseek.com"

# Secrets configuration - using SealedSecrets
secrets:
  # These should remain empty in values.yaml - secrets come from SealedSecret
  discordToken: ""
  dbPassword: ""
  openaiApiKey: ""

# Secret reference configuration for SealedSecrets
secretRef:
  name: discord-bot-secrets  # Name matches the SealedSecret target
  enabled: true

# SealedSecret configuration
sealedSecrets:
  enabled: true  # Enable SealedSecret dependency

# Vibecode: /vibecode lets users have an AI agent implement bot features.
# Requires DEEPSEEK_API_KEY and VIBECODE_GITHUB_TOKEN in the sealed secret;
# also adds RBAC so the bot can run worker Jobs in its namespace.
vibecode:
  enabled: true

# TL;DR: /tldr summarizes recent channel messages via DeepSeek (opt-in only).
# Requires DEEPSEEK_API_KEY in the sealed secret (shared with vibecode).
tldr:
  enabled: true
