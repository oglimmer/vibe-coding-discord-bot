{{- if .Values.vibecode.enabled }}
# The bot's ServiceAccount needs to create and watch vibecode worker Jobs
# in its own namespace and read their pod logs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "discord-bot-vibe.fullname" . }}-vibecode
  labels:
    {{- include "discord-bot-vibe.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "discord-bot-vibe.fullname" . }}-vibecode
  labels:
    {{- include "discord-bot-vibe.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "discord-bot-vibe.fullname" . }}-vibecode
subjects:
  - kind: ServiceAccount
    name: {{ include "discord-bot-vibe.serviceAccountName" . }}
{{- end }}
