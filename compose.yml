
services:
  postgres:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=vibe-bot
      - POSTGRES_USER=vibe-bot
      - POSTGRES_PASSWORD=foobar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibe-bot -d vibe-bot"]
      interval: 3s
      timeout: 60s
      retries: 5
      start_period: 10s
      start_interval: 3s
    ports:
      - "5432:5432"
  bot:
    build: .
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vibe-bot
      - DB_USER=vibe-bot
      - DB_PASSWORD=foobar
      - TZ=Europe/Berlin
      - GAME_START_TIME=13:37:00.000
      - SERGEANT_ROLE_ID=${SERGEANT_ROLE_ID}
      - COMMANDER_ROLE_ID=${COMMANDER_ROLE_ID}
      - GENERAL_ROLE_ID=${GENERAL_ROLE_ID}
      - ANNOUNCEMENT_CHANNEL_ID=${ANNOUNCEMENT_CHANNEL_ID}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTILLON_ENABLED=${POSTILLON_ENABLED:-false}
      - POSTILLON_CHANNEL_ID=${POSTILLON_CHANNEL_ID:-}
      - POSTILLON_FEED_URL=${POSTILLON_FEED_URL:-https://www.der-postillon.com/feeds/posts/default?alt=rss&max-results=50&start-index=1}
      - POSTILLON_POLL_INTERVAL_MINUTES=${POSTILLON_POLL_INTERVAL_MINUTES:-15}
      - POSTILLON_TIMEZONE=${POSTILLON_TIMEZONE:-Europe/Berlin}
      - POSTILLON_ANNOUNCE_FIRST_SYNC=${POSTILLON_ANNOUNCE_FIRST_SYNC:-false}
      - POSTILLON_REQUEST_TIMEOUT_SECONDS=${POSTILLON_REQUEST_TIMEOUT_SECONDS:-20}
      - POSTILLON_DELIVERY_DELAY_SECONDS=${POSTILLON_DELIVERY_DELAY_SECONDS:-1}
      - POSTILLON_LEASE_SECONDS=${POSTILLON_LEASE_SECONDS:-1800}
    depends_on:
        postgres:
            condition: service_healthy

volumes:
  postgres_data:
